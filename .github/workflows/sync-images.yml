name: Sync container images to Docker Hub

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"  # 每6小时执行一次，可自行修改

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo jq

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
          skopeo login docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Login to GHCR (optional)
        if: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_TOKEN != '' }}
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | \
          skopeo login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Run sync script
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          chmod +x scripts/sync-images.sh
          ./scripts/sync-images.sh