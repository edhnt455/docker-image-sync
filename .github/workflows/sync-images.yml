name: Sync container images to Docker Hub

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"  # 每天 UTC 00:00（北京时间 08:00）执行一次

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo jq

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
          skopeo login docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Login to GHCR (optional)
        if: ${{ env.GHCR_USERNAME != '' && env.GHCR_TOKEN != '' }}
        run: |
          echo "${{ env.GHCR_TOKEN }}" | \
          skopeo login ghcr.io -u "${{ env.GHCR_USERNAME }}" --password-stdin

      - name: Run sync script
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          chmod +x scripts/sync-images.sh
          ./scripts/sync-images.sh
